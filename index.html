<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, rgb(88, 223, 201), rgb(61, 137, 188));
        }

        h1 {
            text-align: center;
            font-family: cursive;
            color: lavenderblush;
            background-color: rgb(25, 64, 122)
        }

        #quote {
            font-size: x-large;
            text-align: center;
            font-style: italic;
            margin-bottom: 15px;
            color: #5101ff;
        }

        #taskInput {
            border: 2px solid rgb(0, 0, 0);
            border-radius: 10px;
            padding: 10px;
            margin: 10px;
            font-size: large;
            font-family: 'Times New Roman', Times, serif;
            background-color: rgb(247, 245, 229);

        }

        #priority {
            border: 2px solid rgb(0, 0, 0);
            border-radius: 10px;
            padding: 10px;
            margin: 10px;
            font-family: 'Times New Roman', Times, serif;
            background-color: rgb(247, 245, 229);
        }

        #addButton {
            border: 2px solid rgb(0, 0, 0);
            border-radius: 10px;
            padding: 10px;
            margin: 10px;
            font-family: 'Times New Roman', Times, serif;
            background-color: rgb(247, 245, 229);
            display: block;
        }

        #addButton:hover {
            background-color: rgb(224, 215, 147);
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #faebe9;
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }


        .deleteBtn {
            cursor: pointer;
            color: red;
        }

        .deleteBtn:hover {
            box-shadow: 10px;
            background-color: #d99a91;
            border-radius: 5px;
        }

        .priority {
            font-weight: bold;
            margin-left: 10px;
        }

        .High {
            color: red;
        }

        .Medium {
            color: orange;
        }

        .Low {
            color: green;
        }
    </style>
</head>

<body>
    <h1>Study Planner</h1>

    <div id="quote">
        “Stay consistent, keep learning!”
    </div>

    <div>
        <input type="text" id="taskInput" placeholder="Enter task">
        <select id="priority">
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
        </select>
        <button id="addButton">Add Task</button>
    </div>

    <ul id="taskList"></ul>

    <script>
        const addButton = document.getElementById('addButton');
        const taskInput = document.getElementById('taskInput');
        const prioritySelect = document.getElementById('priority');
        const taskList = document.getElementById('taskList');

        addButton.addEventListener('click', () => {
            const taskText = taskInput.value.trim();
            if (taskText === '') return;

            const li = document.createElement('li');

            const spanText = document.createElement('span');
            spanText.textContent = taskText;

            const spanPriority = document.createElement('span');
            spanPriority.textContent = prioritySelect.value;
            spanPriority.classList.add('priority', prioritySelect.value);

            const delBtn = document.createElement('span');
            delBtn.textContent = 'Delete';
            delBtn.classList.add('deleteBtn');
            delBtn.addEventListener('click', () => li.remove());

            li.appendChild(spanText);
            li.appendChild(spanPriority);
            li.appendChild(delBtn);

            taskList.appendChild(li);
            taskInput.value = '';
        });
    </script>

</body>

</html>
